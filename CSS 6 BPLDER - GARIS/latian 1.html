<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .container-box {
        margin-bottom: 50px;
    }

    .box {
        width: 300px;
    
        height: 50px;
        text-align: center;
        font-weight: bold;
        background-color: white;
    }


    .solid {
        border: 5px solid black;
        margin-top: 15px;
        margin-bottom: 15px;
    }

    .double {
        border: 5px double blue;
        margin-top: 15px;
        margin-bottom: 15px;
    }

    .groove {
        border: 5px groove green;
        margin-top: 15px;
        margin-bottom: 15px;
    }

    .ridge {
        border: 5px ridge red;
        margin-top: 15px;
        margin-bottom: 15px;
    }
    </style>
</head>
<body>
     <h1> Latihan CSS Border</h1>

    <div class="container-box">
        <div class="box solid">Solid Hitam</div>
        <div class="box double">Double Biru</div>
        <div class="box groove">Groove Hijau</div>
        <div class="box ridge">Ridge Merah</div>
    </div>
</body>
</html>
