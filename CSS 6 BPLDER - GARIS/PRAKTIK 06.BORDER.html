<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: sans-serif;
        }
        header {
            border: 2px solid rgb(243, 56, 46);
            text-align: center;
            margin-bottom: 1em;
        }
        article {
            border: 2px solid pink;
            padding: 1em;
            margin-bottom: 1em;
        }
        footer {
            text-align: center;
            padding: 0.5em;
            border: 2px solid turquoise;
        }
    </style>
</head>
<body>
    <header>
    <h1>Latian Border</h1>
    </header>
     
    <article>
        Ini adalah contoh paragraf artikel buat Latihan
        properti border di CSS. Properti border adalah propert
        untuk membuat garis pada sisi elemen HTML. Garis ini
        berguna untuk memberikan batas antar elemen. Sehingga,
        bisa terlihat ada pemisah dan menjadi kesatuan.
    </article>

    <footer>
        &copy; 2026 CSS - X PPLG
    </footer>
</body>
</html>
